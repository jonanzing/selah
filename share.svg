<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#010B14"/>
  
  <!-- Subtle Gradient Glows -->
  <circle cx="1000" cy="100" r="400" fill="url(#glow1)" opacity="0.15"/>
  <circle cx="200" cy="500" r="300" fill="url(#glow2)" opacity="0.1"/>
  
  <!-- Gradients -->
  <defs>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1000 100) rotate(90) scale(400)">
      <stop stop-color="#02C1A8"/>
      <stop offset="1" stop-color="#02C1A8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(200 500) rotate(90) scale(300)">
      <stop stop-color="#0AB916"/>
      <stop offset="1" stop-color="#0AB916" stop-opacity="0"/>
    </radialGradient>
    
    <linearGradient id="logo_grad" x1="12" y1="1" x2="12" y2="23" gradientUnits="userSpaceOnUse">
      <stop offset="0.0144231" stop-color="#02C1A8"/>
      <stop offset="0.456731" stop-color="#0AB916"/>
      <stop offset="1" stop-color="#002445"/>
    </linearGradient>

    <!-- Logo Filter -->
    <filter id="logo_filter" x="0" y="0" width="24" height="24" filterUnits="userSpaceOnUse">
      <feFlood flood-opacity="0" result="bg"/>
      <feBlend mode="normal" in="SourceGraphic" in2="bg" result="shape"/>
    </filter>
  </defs>

  <!-- Large Brand Logo -->
  <g transform="translate(100, 180) scale(8)">
    <path d="M12.2031 1.09025C12.0738 1.03279 11.9262 1.03279 11.7969 1.09025L3.29693 4.86803C3.11637 4.94828 3 5.12734 3 5.32494V11C3 16.4571 6.74101 21.6189 11.8787 22.9689C11.9581 22.9898 12.0419 22.9898 12.1213 22.9689C17.259 21.6189 21 16.4571 21 11V5.32494C21 5.12734 20.8836 4.94828 20.7031 4.86803L12.2031 1.09025ZM16 9.5C16 9.77614 15.7761 10 15.5 10H13.5C13.2239 10 13 10.2239 13 10.5V17.5C13 17.7761 12.7761 18 12.5 18H11.5C11.2239 18 11 17.7761 11 17.5V10.5C11 10.2239 10.7761 10 10.5 10H8.5C8.22386 10 8 9.77614 8 9.5V8.5C8 8.22386 8.22386 8 8.5 8H10.5C10.7761 8 11 7.77614 11 7.5V5.5C11 5.22386 11.2239 5 11.5 5H12.5C12.7761 5 13 5.22386 13 5.5V7.5C13 7.77614 13.2239 8 13.5 8H15.5C15.7761 8 16 8.22386 16 8.5V9.5Z" fill="url(#logo_grad)"/>
  </g>

  <!-- Typography -->
  <text x="340" y="270" font-family="Georgia, serif" font-size="120" font-weight="bold" fill="white">Selah</text>
  
  <!-- Description Wrapper -->
  <foreignObject x="340" y="290" width="760" height="240">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: 'Inter', system-ui, sans-serif; font-size: 32px; line-height: 1.5; color: rgba(255,255,255,0.7); font-weight: 300;">
      Selah is a bible app built for daily encounter to Transform your daily study into a shared journey. Track your streaks, join live prayer rooms, and unlock deeper scriptural insights.
    </div>
  </foreignObject>

  <!-- Decorative Line -->
  <rect x="340" y="285" width="60" height="4" fill="#0AB916"/>
</svg>
